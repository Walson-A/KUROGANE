<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#151a2c" />
    <title>KUROGANE 黒鉄</title>
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- Interface par-dessus le jeu (chrono, sort équipé, progression) -->
    <div id="hud">
      <div id="score">0.0 s</div>
      <!-- Deux rouleaux en main : le 1er est celui qu'on lancera (file d'attente) -->
      <div id="spells">
        <div class="slot actif" id="slot0">—</div>
        <div class="slot" id="slot1">—</div>
      </div>
    </div>
    <div id="progressbar">
      <div id="progressfill"></div>
      <div id="oppmark" class="hidden"></div>
    </div>
    <!-- Le classement en direct de l'entraînement (rempli en JS) -->
    <div id="rank" class="hidden"></div>

    <div id="count"></div>
    <div id="flash"></div>
    <!-- 💨 La bombe fumigène : on ne voit plus les obstacles arriver -->
    <div id="fumee"></div>
    <div id="toast"></div>

    <!-- Sprint final : la jauge de martèlement des derniers mètres -->
    <div id="sprint" class="hidden">
      <div id="sprintlabel">SPRINT FINAL</div>
      <div id="sprintbar"><div id="sprintfill"></div></div>
    </div>

    <!-- Écran de menu / game over -->
    <div id="overlay">
      <div class="jp">黒鉄</div>
      <h1>KUROGANE</h1>
      <p id="msg">
        1 920 m jusqu'au torii sacré. Les obstacles te ralentissent !<br />
        Swipe ⬅️ ➡️ ⬆️ ⬇️ pour esquiver, double-tap : sort.<br />
        🔥 Sur les 120 derniers mètres : <b>martèle l'écran</b> pour accélérer !<br />
        Clavier : flèches ou ZQSD, espace pour le sprint.
      </p>
      <div id="btns">
        <button id="btnOnline">⚔️ COURSE EN LIGNE</button>
        <button id="btnSolo" class="secondary">ENTRAÎNEMENT SOLO</button>
      </div>

      <!-- 2e écran : contre combien de rivaux ? (boutons créés en JS) -->
      <div id="botpick" class="hidden">
        <div id="botpicklabel">Combien de rivaux ?</div>
        <div id="botrow"></div>
        <div id="botnames"></div>
        <button id="btnGo">⛩️ EN PISTE</button>
        <button id="btnBack" class="secondary">← Retour</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
