<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#151a2c" />
    <title>KUROGANE 黒鉄</title>
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- Interface par-dessus le jeu (chrono, sort équipé, progression) -->
    <div id="hud">
      <div id="score">0.0 s</div>
      <div id="spell">📜 —</div>
    </div>
    <div id="progressbar"><div id="progressfill"></div></div>
    <div id="count"></div>
    <div id="flash"></div>
    <div id="toast"></div>

    <!-- Écran de menu / game over -->
    <div id="overlay">
      <div class="jp">黒鉄</div>
      <h1>KUROGANE</h1>
      <p id="msg">
        600 m jusqu'au torii sacré. Les obstacles te ralentissent !<br />
        Swipe ⬅️ ➡️ ⬆️ ⬇️ pour esquiver, double-tap : sort.<br />
        Clavier : flèches ou ZQSD.
      </p>
      <button id="btn">DÉPART</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
