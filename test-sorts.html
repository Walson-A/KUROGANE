<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#151a2c" />
    <title>KUROGANE — banc d'essai des sorts</title>
    <style>
      /* Les deux panneaux encadrent la piste : la liste à gauche, l'état à
         droite. Le bas-centre reste libre — c'est là que vit la jauge de
         sprint, et la masquer ferait rater le départ canon. */
      .essai {
        position: fixed;
        z-index: 30;
        padding: 8px;
        border-radius: 10px;
        background: rgba(13, 16, 28, 0.86);
        border: 1px solid #3d4560;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 0.78rem;
        color: #9aa4c0;
        user-select: none;
      }
      #essai { left: 12px; bottom: 12px; width: 208px; }
      #etat { right: 12px; bottom: 12px; width: 178px; }

      .titre {
        font-size: 0.62rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #6b7594;
        margin-bottom: 6px;
      }
      .sort {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 3px 6px;
        border-radius: 6px;
        line-height: 1.5;
      }
      /* Le sort tenu : on doit le repérer d'un coup d'œil pendant la course */
      .sort.on {
        background: rgba(226, 75, 58, 0.26);
        color: #f0e8d8;
        font-weight: 700;
      }
      .marque { margin-left: auto; opacity: 0.5; font-size: 0.7rem; }

      /* Le mode : lancer le sort, ou le SUBIR. C'est toute la raison d'être de
         cette page — donc c'est gros, et ça se voit. */
      .mode { display: flex; gap: 6px; margin: 8px 0 6px; }
      .mode button {
        flex: 1;
        padding: 5px 0;
        border-radius: 6px;
        border: 1px solid #3d4560;
        background: transparent;
        color: #9aa4c0;
        font-family: inherit;
        font-size: 0.72rem;
        cursor: pointer;
      }
      .mode button.on { background: #e24b3a; border-color: #e24b3a; color: #fff; }
      /* La séance : figer la piste, et en sortir. Vert pour « immobile », gris
         pour « quitter » — deux gestes qui n'ont rien à voir avec les sorts. */
      .mode.seance button.on { background: #1d9e75; border-color: #1d9e75; }
      .mode.seance button.sortie { flex: 0 0 62px; }

      .ligne { display: flex; gap: 6px; padding: 2px 6px; line-height: 1.6; }
      .ligne b { color: #f0e8d8; font-weight: 500; }
      .ligne .v { margin-left: auto; color: #f0e8d8; }
      .ligne.eteint { opacity: 0.32; }
      /* Une jauge maigre sous chaque effet actif : on lit le temps qui reste
         d'un coup d'œil, sans déchiffrer un nombre qui défile. */
      .jauge { height: 2px; background: #e24b3a; border-radius: 2px; margin: 0 6px 3px; }

      .aide {
        margin-top: 7px;
        padding-top: 6px;
        border-top: 1px dashed #3d4560;
        font-size: 0.7rem;
        line-height: 1.6;
        color: #6b7594;
      }
      kbd {
        background: #3d4560;
        color: #f0e8d8;
        border-radius: 4px;
        padding: 0 5px;
        font-family: inherit;
        font-size: 0.72rem;
      }
    </style>
  </head>
  <body>
    <script type="module">
      // On CHARGE le vrai index.html plutôt que d'en recopier le balisage : une
      // copie finirait par mentir le jour où l'interface bouge.
      const html = await (await fetch('/index.html')).text()
      const doc = new DOMParser().parseFromString(html, 'text/html')
      document.body.insertAdjacentHTML('afterbegin', doc.body.innerHTML)

      // Les <script> insérés par innerHTML ne s'exécutent pas : c'est nous qui
      // démarrons le jeu, une seule fois, juste ici.
      const { PARCHEMINS, TIRAGE, EFFETS } = await import('/src/parchemin.ts')
      await import('/src/main.ts')

      const guichet = window.__sorts
      if (!guichet) throw new Error('Le guichet de test est absent (build de production ?)')

      const panneau = document.createElement('div')
      panneau.id = 'essai'
      panneau.className = 'essai'
      const etatEl = document.createElement('div')
      etatEl.id = 'etat'
      etatEl.className = 'essai'
      document.body.append(panneau, etatEl)

      let idx = 0
      /*
       * Deux modes, et c'est TOUTE la raison d'être de cette page.
       *
       * « Lancer » joue le sort comme un joueur : les sorts offensifs partent
       * alors chez un rival, et on ne voit rien de leur effet — juste un
       * projectile qui s'éloigne de dos. « Subir » emprunte le chemin
       * d'arrivée, celui qu'un rival déclenche chez nous : on voit enfin la
       * fumée, la boue, les chaînes et le poison SUR SOI.
       *
       * On démarre sur « subir » : c'est ce qu'on vient chercher ici.
       */
      let mode = 'subir'
      /*
       * 🧪 La piste figée : le décor s'arrête, plus rien ne vient te percuter,
       * et tu regardes l'effet posément. Les minuteurs continuent de tourner —
       * sinon on ne verrait jamais comment un sort se dissipe.
       *
       * On démarre FIGÉ : on vient ici pour observer, pas pour courir.
       */
      let fige = true

      // Chaque effet avec sa durée pleine, pour dessiner une jauge honnête.
      const ETATS = [
        ['vent', '🌀 Vent', 1.5],
        ['grue', '🕊️ Grue', 7],
        ['armure', '🛡️ Armure', 2],
        ['miroir', '🪞 Miroir', 8],
        ['the', '🍵 Thé', 3],
        ['kusarigama', '⛓️ Chaînes', 2],
        ['fumigene', '💨 Fumée', 2.5],
        ['senbon', '☠️ Poison', 3],
        ['stumble', '💥 Chute', 1.2],
      ]

      function dessiner() {
        const lignes = TIRAGE.map((k, i) => {
          const p = PARCHEMINS[k]
          // ⚔ = il lui faut une cible pour être LANCÉ. En mode « subir » la
          // distinction disparaît : tout retombe sur nous.
          const marque = p.cible === 'soi' ? '·' : '⚔'
          return `<div class="sort${i === idx ? ' on' : ''}">${p.icone} ${p.nom}<span class="marque">${marque}</span></div>`
        }).join('')
        panneau.innerHTML =
          `<div class="titre">Les dix parchemins</div>${lignes}` +
          `<div class="mode">` +
          `<button data-m="subir" class="${mode === 'subir' ? 'on' : ''}">Subir</button>` +
          `<button data-m="lancer" class="${mode === 'lancer' ? 'on' : ''}">Lancer</button>` +
          `</div>` +
          `<div class="mode seance">` +
          `<button data-g="1" class="${fige ? 'on' : ''}">${fige ? 'Immobile' : 'Figer'}</button>` +
          `<button data-q="1" class="sortie">Quitter</button>` +
          `</div>` +
          `<div class="aide">${EFFETS[TIRAGE[idx]]}</div>` +
          `<div class="aide"><kbd>o</kbd> / <kbd>i</kbd> choisir · <kbd>e</kbd> déclencher<br />` +
          `<kbd>t</kbd> mode · <kbd>f</kbd> figer · <kbd>r</kbd> nettoyer · <kbd>q</kbd> quitter</div>`
        for (const b of panneau.querySelectorAll('.mode button')) {
          b.addEventListener('click', () => {
            if (b.dataset.q) return quitter()
            if (b.dataset.g) return basculerGel()
            mode = b.dataset.m
            appliquer()
          })
        }
      }

      /** Remet le sort choisi en main et redessine. */
      function appliquer() {
        guichet.donner(TIRAGE[idx])
        dessiner()
      }

      function choisir(n) {
        idx = (n + TIRAGE.length) % TIRAGE.length
        appliquer()
      }

      function declencher() {
        if (mode === 'subir') guichet.subir(TIRAGE[idx])
        else guichet.lancer()
        // On se remet le rouleau en main : lancé, il est consommé, et on veut
        // pouvoir recommencer sans re-sélectionner.
        setTimeout(appliquer, 0)
      }

      /** 🍵 Le thé lave tout : c'est le bouton « remise à zéro » du banc. */
      const nettoyer = () => guichet.subir('the')

      function basculerGel() {
        fige = !fige
        guichet.geler(fige)
        dessiner()
      }

      /** On quitte la course et on revient au menu, sans recharger la page. */
      function quitter() {
        guichet.quitter()
        dessiner()
      }

      addEventListener(
        'keydown',
        (e) => {
          if (e.repeat) return
          const k = e.key.toLowerCase()
          if (k === 'o') choisir(idx + 1)
          else if (k === 'i') choisir(idx - 1)
          else if (k === 't') {
            mode = mode === 'subir' ? 'lancer' : 'subir'
            appliquer()
          } else if (k === 'r') nettoyer()
          else if (k === 'e' && mode === 'subir') {
            /*
             * En mode « subir », E ne doit PAS lancer le sort. On intercepte la
             * touche AVANT le jeu (écouteur en phase de capture + arrêt de la
             * propagation) : sans ça le parchemin partirait chez un rival et on
             * ne verrait toujours rien.
             */
            e.stopImmediatePropagation()
            e.preventDefault()
            declencher()
          }
        },
        true
      )

      // ————— Le tableau de bord, rafraîchi à chaque image —————
      // Sans lui, on voit un effet à l'écran sans savoir combien de temps il
      // dure encore, ni ce qui se cumule avec quoi.
      function suivre() {
        requestAnimationFrame(suivre)
        const s = guichet.etat()
        if (!s) return
        const lignes = ETATS.map(([cle, nom, plein]) => {
          const v = s[cle]
          const actif = v > 0.01
          const part = v === Infinity ? 1 : Math.min(1, v / plein)
          const texte =
            v === Infinity ? 'levée' : cle === 'armure' ? `${v}` : actif ? `${v.toFixed(1)}s` : '—'
          return (
            `<div class="ligne${actif ? '' : ' eteint'}"><b>${nom}</b><span class="v">${texte}</span></div>` +
            (actif ? `<div class="jauge" style="width:${(part * 88).toFixed(0)}%"></div>` : '')
          )
        }).join('')
        const treve = s.treve > 0.01 && s.enCourse
        etatEl.innerHTML =
          `<div class="titre">Ce que je subis</div>${lignes}` +
          `<div class="ligne${s.terre ? '' : ' eteint'}"><b>🎯 Terre</b>` +
          `<span class="v">${s.terre ? 'collée' : '—'}</span></div>` +
          `<div class="ligne${treve ? '' : ' eteint'}"><b>👻 Trêve</b>` +
          `<span class="v">${treve ? s.treve.toFixed(1) + 's' : '—'}</span></div>` +
          `<div class="ligne${s.gele ? '' : ' eteint'}"><b>🧪 Piste</b>` +
          `<span class="v">${s.gele ? 'figée' : 'défile'}</span></div>`
      }

      // On redonne le sort tenu à chaque nouvelle course : `startRace` vide les
      // slots, et sans ça on repartirait les mains vides sans comprendre.
      // On redonne le sort ET on refige à chaque nouvelle course : `startRace`
      // repart d'une piste neuve, sans rien savoir du banc d'essai.
      const btnGo = document.getElementById('btnGo')
      if (btnGo)
        btnGo.addEventListener('click', () =>
          setTimeout(() => {
            appliquer()
            guichet.geler(fige)
          }, 0)
        )

      appliquer()
      guichet.geler(fige)
      suivre()
    </script>
  </body>
</html>
