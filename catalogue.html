<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#151a2c" />
    <title>KUROGANE — catalogue des objets</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%; overflow: hidden; background: #151a2c; color: #f0e8d8;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif; user-select: none;
      }
      #vue { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
      #vue:active { cursor: grabbing; }

      .panneau {
        position: fixed; z-index: 10; padding: 9px;
        border-radius: 10px; background: rgba(13, 16, 28, 0.85);
        border: 1px solid #3d4560; font-size: 0.78rem; color: #9aa4c0;
      }
      #rayons { left: 12px; top: 12px; width: 158px; }
      #panneauBiomes { right: 12px; top: 12px; width: 176px; }
      #aide { left: 12px; bottom: 12px; line-height: 1.6; }

      .titre {
        font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
        color: #6b7594; margin-bottom: 6px;
      }
      .ligne {
        padding: 4px 7px; border-radius: 6px; line-height: 1.5; cursor: pointer;
      }
      .ligne:hover { background: rgba(61, 69, 96, 0.4); }
      /* La sélection doit sauter aux yeux : c'est l'unique repère de la page */
      .ligne.on { background: rgba(226, 75, 58, 0.26); color: #f0e8d8; font-weight: 700; }

      /* Un rayon qui ne dépend pas du biome éteint le panneau : sans ça, on
         appuierait sur p/m en croyant que ça change quelque chose. */
      #biomes.inerte { opacity: 0.32; pointer-events: none; }

      #compteur {
        position: fixed; z-index: 10; right: 12px; bottom: 12px;
        font-size: 0.74rem; color: #6b7594;
        background: rgba(13, 16, 28, 0.85); border: 1px solid #3d4560;
        border-radius: 8px; padding: 5px 10px;
      }

      /* ——— Les étiquettes projetées ———
         Elles ne captent PAS le pointeur : elles couvrent la scène, et sans ça
         on ne pourrait plus faire tourner la vue en glissant dessus. */
      #etiquettes { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
      .etiq3d {
        position: absolute; transform: translate(-50%, 8px);
        text-align: center; white-space: nowrap;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9), 0 0 3px rgba(0, 0, 0, 0.9);
      }
      .etiq3d b { display: block; font-size: 0.76rem; color: #f0e8d8; }
      .etiq3d small { font-size: 0.66rem; color: #9aa4c0; }
    </style>
  </head>
  <body>
    <canvas id="vue"></canvas>
    <div id="etiquettes"></div>

    <div class="panneau" id="rayons">
      <div class="titre">Rayon</div>
    </div>

    <div class="panneau" id="panneauBiomes">
      <div class="titre">Biome</div>
      <div id="biomes"></div>
    </div>

    <div class="panneau" id="aide">
      o / i rayon · p / m biome<br />
      glisser tourner · molette zoomer<br />
      j / k tourner · g / b zoomer
    </div>

    <div id="compteur"></div>

    <script type="module" src="/src/catalogue.ts"></script>
  </body>
</html>
